<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETRAAM LUXURY | Essential Fragrances</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Playfair+Display+SC:wght@700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #c5a021; 
            --gold-light: #f4e4a1; 
            --black: #080808; 
            --white: #ffffff; 
            --glass: rgba(255, 255, 255, 0.92);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Lora', serif; 
            background-color: #fdfdfd;
            color: var(--black);
            overflow-x: hidden;
            /* Royal Background Texture */
            background-image: 
                linear-gradient(rgba(255,255,255,0.9), rgba(255,255,255,0.9)),
                url('https://www.transparenttextures.com/patterns/pinstriped-suit.png');
        }

        /* --- Luxury Header --- */
        header { 
            padding: 50px 20px; 
            text-align: center; 
            background: var(--white); 
            border-bottom: 2px solid var(--gold); 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        
        /* THE LOGO: ROYAL GOLD ETRAAM */
        .logo { 
            font-family: 'Cinzel', serif;
            font-size: 55px; 
            letter-spacing: 18px; 
            font-weight: 700; 
            text-transform: uppercase; 
            text-decoration: none; 
            /* Rich Gold Gradient */
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
            filter: drop-shadow(0px 3px 2px rgba(0,0,0,0.15));
            transition: 0.5s;
        }
        
        .logo:hover {
            filter: drop-shadow(0px 0px 15px rgba(197, 160, 33, 0.4));
            transform: scale(1.02);
        }

        .tagline { 
            font-size: 10px; 
            letter-spacing: 7px; 
            color: #888; 
            text-transform: uppercase; 
            margin-top: 15px; 
            font-family: 'Playfair Display', serif;
            font-style: italic;
        }

        /* --- Navigation --- */
        nav { display: flex; justify-content: center; gap: 40px; padding: 25px 0 0; }
        nav a { 
            text-decoration: none; 
            color: #333; 
            font-size: 11px; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            font-weight: 600; 
            transition: 0.3s;
        }
        nav a:hover { color: var(--gold); }

        /* --- Hero Section --- */
        .hero { 
            padding: 140px 20px; 
            text-align: center; 
            background: radial-gradient(circle, #fff 0%, #fcfaf5 100%);
            border-bottom: 1px solid #eee;
        }
        .hero h1 { 
            font-family: 'Playfair Display SC', serif;
            font-size: 48px; 
            letter-spacing: 6px; 
            color: #1a1a1a;
            margin-bottom: 20px;
        }
        .hero p { font-size: 18px; color: #666; font-style: italic; max-width: 650px; margin: 0 auto; letter-spacing: 1px; }

        /* --- Product Grid --- */
        .section-header { text-align: center; padding: 120px 20px 50px; }
        .section-header h2 { 
            font-family: 'Cinzel', serif;
            font-size: 34px; 
            letter-spacing: 12px; 
            text-transform: uppercase;
            color: var(--gold);
        }

        .container { 
            max-width: 1300px; 
            margin: auto; 
            padding: 0 20px 100px; 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 50px; 
        }
        
        .card { 
            background: var(--white); 
            padding: 40px; 
            text-align: center; 
            border: 1px solid #f0f0f0;
            transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
        }
